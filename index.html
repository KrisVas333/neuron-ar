<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<title>Neuronas — BrAIn Club 🧠</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root { --bc-purple:#6C3CE9; --bc-glow:#9d7bff; --bc-dark:#14092e; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,'Segoe UI',sans-serif; background:radial-gradient(ellipse at 50% -10%,#33206b 0%,var(--bc-dark) 65%); color:#fff; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }
  header { text-align:center; padding:18px 16px 4px; }
  header h1 { font-size:1.45rem; letter-spacing:.5px; }
  header p { opacity:.7; font-size:.9rem; margin-top:4px; }
  #lang { position:fixed; top:14px; right:14px; z-index:10; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff; border-radius:999px; padding:8px 14px; font-size:.95rem; font-weight:700; cursor:pointer; }
  model-viewer { width:100%; max-width:520px; height:48vh; --poster-color:transparent; }
  .ar-button-slot { background:#fff; color:var(--bc-dark); font-weight:800; border-radius:999px; padding:13px 24px; border:none; font-size:1rem; box-shadow:0 0 0 4px rgba(157,123,255,.35),0 6px 22px rgba(0,0,0,.5); }
  #bubble { min-height:74px; max-width:440px; margin:6px 16px; background:rgba(255,255,255,.1); border:1px solid rgba(157,123,255,.4); border-radius:18px 18px 18px 4px; padding:14px 18px; font-size:1rem; line-height:1.45; display:flex; align-items:center; box-shadow:inset 0 0 30px rgba(108,60,233,.15); }
  #bubble.speaking { border-color:var(--bc-glow); animation:glow 1.2s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow:inset 0 0 30px rgba(108,60,233,.15) } to { box-shadow:inset 0 0 30px rgba(157,123,255,.45) } }
  .btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:440px; padding:8px 16px 26px; }
  .btns button { background:linear-gradient(160deg,rgba(108,60,233,.85),rgba(70,35,160,.85)); border:1px solid rgba(157,123,255,.5); color:#fff; font-size:.92rem; font-weight:700; padding:14px 10px; border-radius:16px; cursor:pointer; line-height:1.25; }
  .btns button:active { transform:scale(.96); }
  footer { margin-top:auto; padding:12px; opacity:.45; font-size:.75rem; text-align:center; }
</style>
</head>
<body>
<button id="lang">🇱🇹 LT</button>
<header>
  <h1>🧠 Neuronas</h1>
  <p id="subtitle">Tavo BrAIn Club draugas</p>
</header>

<model-viewer id="mv"
  src="neuron.glb?v=2"
  alt="Neuronas — BrAIn Club 3D veikėjas"
  ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto"
  camera-controls autoplay shadow-intensity="1" environment-image="neutral">
  <button slot="ar-button" class="ar-button-slot" id="arbtn">✨ Pakviesk Neuroną į kambarį</button>
</model-viewer>

<div id="bubble">…</div>

<div class="btns">
  <button data-line="hello">👋 <span>Pasisveikink!</span></button>
  <button data-line="city">🏙️ <span>Smegenų miestas</span></button>
  <button data-line="vibe">😎 <span>Ar aš vibe žmogus?</span></button>
  <button data-line="alien">👽 <span>Papasakok apie ateivius</span></button>
</div>

<footer>BrAIn Club · pirmos pamokos dovana · brainclub.io</footer>

<script>
const SCRIPT = {
  lt: {
    subtitle: "Tavo BrAIn Club draugas",
    greet: "Labas! Aš — Neuronas. Paspausk mygtuką ir pasikalbėkim! 🧠",
    hello: "Labas, drauge! Aš Neuronas — gyvenu tavo smegenyse kartu su 86 milijardais brolių ir sesių. Nuo šiandien mes — komanda! Sveikas atvykęs į BrAIn Club!",
    city: "Tavo galvoje auga tikras Smegenų Miestas! Kiekvieną kartą, kai išmoksti ką nors naujo, jame pastatomas naujas pastatas. Kai klysti ir bandai dar kartą — keliai tampa platesni. Tavo darbas — statyti, saugoti ir puoselėti savo miestą. Aš tau padėsiu!",
    vibe: "Taip! Tu mokaisi vibe'inti su savimi, su kitais ir su visu pasauliu. Tai reiškia — pažinti savo mintis, suprasti draugus ir smalsiai tyrinėti viską aplink. Tai pati svarbiausia supergalia!",
    alien: "Žinai, kokia mano svajonė? Kad mes, žmonės, taip gerai pažintume savo protą ir taip gražiai gyventume — kad net ateiviai norėtų būti mūsų draugais! Viskas prasideda nuo tavo smegenų miesto. Statykim!",
    arHint: "Paspausk ✨ mygtuką ir nukreipk telefoną į grindis!"
  },
  en: {
    subtitle: "Your BrAIn Club friend",
    greet: "Hi! I'm Neuron. Tap a button and let's talk! 🧠",
    hello: "Hello, friend! I'm Neuron — I live in your brain with 86 billion brothers and sisters. From today, we're a team! Welcome to BrAIn Club!",
    city: "A real Brain City is growing inside your head! Every time you learn something new, a new building appears. When you make a mistake and try again — the roads get wider. Your job is to build, protect and grow your city. I'll help you!",
    vibe: "Yes! You're learning to vibe with yourself, with others, and with the whole world. That means knowing your thoughts, understanding your friends, and exploring everything around you with curiosity. It's the greatest superpower!",
    alien: "Want to know my dream? That we humans understand our minds so well, and live so beautifully — that even aliens would want to be our friends! It all starts with your Brain City. Let's build!",
    arHint: "Tap the ✨ button and point your phone at the floor!"
  }
};
let lang = 'lt';
const bubble = document.getElementById('bubble');
const synth = window.speechSynthesis;
let voices = [];
function loadVoices(){ voices = synth.getVoices(); }
loadVoices(); if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(text){
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'lt' ? 'lt-LT' : 'en-US';
  u.rate = 0.95; u.pitch = 1.25; // friendly, slightly high — kid character
  const v = voices.find(v => v.lang.startsWith(lang === 'lt' ? 'lt' : 'en'));
  if (v) u.voice = v;
  u.onstart = () => bubble.classList.add('speaking');
  u.onend = () => bubble.classList.remove('speaking');
  synth.speak(u);
}
function say(key){
  const t = SCRIPT[lang][key];
  bubble.textContent = t;
  speak(t);
  playAnim(key);
}
document.querySelectorAll('.btns button').forEach(b =>
  b.addEventListener('click', () => say(b.dataset.line)));

document.getElementById('lang').addEventListener('click', () => {
  lang = lang === 'lt' ? 'en' : 'lt';
  document.getElementById('lang').textContent = lang === 'lt' ? '🇱🇹 LT' : '🇬🇧 EN';
  document.getElementById('subtitle').textContent = SCRIPT[lang].subtitle;
  bubble.textContent = SCRIPT[lang].greet;
});

// --- animation state machine (works with 1 or many clips in the GLB) ---
const mv = document.getElementById('mv');
const ANIM_MAP = { hello:['wave','hello','greet'], city:['walking','walk'], vibe:['dance','breakdance'], alien:['backflip','flip'] };
let anims = [];
mv.addEventListener('load', () => {
  anims = mv.availableAnimations || [];
  if (anims.length){ mv.animationName = pick(['walking','idle']) || anims[0]; mv.play(); }
  bubble.textContent = SCRIPT[lang].greet;
});
function pick(cands){ return anims.find(a => cands.some(c => a.toLowerCase().includes(c))); }
function playAnim(key){
  if (!anims.length) return;
  const target = pick(ANIM_MAP[key] || []) || anims[0];
  mv.animationName = target; mv.play();
  const backTo = pick(['walking','idle']) || anims[0];
  clearTimeout(playAnim._t);
  playAnim._t = setTimeout(() => { mv.animationName = backTo; mv.play(); }, 6000);
}
// 🥚 easter egg: tap Neuron himself 5 times → BACKFLIP
let taps = 0, tapTimer;
mv.addEventListener('click', () => {
  taps++; clearTimeout(tapTimer); tapTimer = setTimeout(() => taps = 0, 4000);
  if (taps >= 5) { taps = 0;
    const bf = anims.find(a => a.toLowerCase().includes('backflip'));
    if (bf) { mv.animationName = bf; mv.play();
      const msg = lang==='lt' ? 'OHOHO! Radai mano slaptą triuką! 🤸 Parodyk draugams!' : 'WHOA! You found my secret trick! 🤸 Show your friends!';
      bubble.textContent = msg; speak(msg);
      setTimeout(() => { const back = pick(['walking']) || anims[0]; mv.animationName = back; mv.play(); }, 5000);
    }
  }
});

bubble.textContent = SCRIPT.lt.greet;
</script>
</body>
</html>
